services:
  - type: web
    name: gym-tracker-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GYM_API_KEY
        sync: false

  - type: web
    name: gym-tracker-frontend
    runtime: node
    rootDir: frontend
    buildCommand: git fetch --unshallow || true && npm install && npm run build
    startCommand: npx serve dist -s -l $PORT
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_KEY
        sync: false
